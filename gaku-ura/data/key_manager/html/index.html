<!option title HAMKEY>
<!include index.js>
<!option robots 1>
<!option description 部室などの鍵の状況を確認できます。>
<h1>HAMKEY</h1>
<p>部室などの鍵の状況。</p>

<!-- 非同期処理(javascriptを使ってリロードしなくても随時更新される機能)を考慮する -->
<table>
	<thead>
		<tr>
			<th>場所</th>
			<th>状態</th>
			<th>備考</th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td>部室</td>
			<td id="my_room">{MY_ROOM}</td>
			<td id="my_room_else">{MY_ROOM_ELSE}</td>
		</tr>
		<tr>
			<td>予約</td>
			<td id="book_room">{BOOK_ROOM}</td>
			<td id="book_room_else">{BOOK_ROOM_ELSE}</td>
		</tr>
		<tr>
			<td>その他</td>
			<td colspan="2" id="other">{OTHER}</td>
		</tr>
	</tbody>
</table>

{ADMIN_ONLY}
